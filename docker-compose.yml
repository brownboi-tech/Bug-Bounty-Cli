services:
  api:
    build: .
    container_name: hexa-ai-api
    env_file:
      - .env
    environment:
      HEXA_AI_HOST: 0.0.0.0
      HEXA_AI_PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hexa_ai
    ports:
      - "8080:8080"
    depends_on:
      - db
    volumes:
      - ./results:/app/results

  db:
    image: postgres:16
    container_name: hexa-ai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hexa_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
